version: "3"

tasks:
  build:
    desc: Build the provider binary
    cmds:
      - go build -o terraform-provider-remnawave

  fmt:
    desc: Format Go files
    cmds:
      - gofmt -w provider/*.go

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  test:unit:
    desc: Run unit tests (no Docker / Terraform needed)
    cmds:
      - go test ./provider -skip '^TestAcc' -count=1 -v

  test:coverage:
    desc: Run unit tests with race detection and coverage
    cmds:
      - go test ./provider -skip '^TestAcc' -count=1 -race -covermode=atomic -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  test:vuln:
    desc: Scan reachable Go code for known vulnerabilities
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  docs:
    desc: Format examples and generate Terraform Registry documentation
    cmds:
      - terraform fmt -recursive examples
      - go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0 generate --provider-dir .

  docs:check:
    desc: Validate docs and fail if generated documentation is stale
    cmds:
      - terraform fmt -check -recursive examples
      - go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0 generate --provider-dir .
      - go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0 validate --provider-dir .
      - ./scripts/check-docs-drift.sh

  test:acc:
    desc: Run acceptance tests (needs Docker)
    cmds:
      - docker compose down -v 2>/dev/null || true
      - docker compose up --detach --wait --quiet-pull
      - defer: docker compose down -v
      - >-
        curl -sf -X POST http://localhost:3000/api/auth/register
        -H "Content-Type: application/json"
        -H "X-Forwarded-For: 127.0.0.1"
        -H "X-Forwarded-Proto: https"
        -H "X-Remnawave-Client-Type: browser"
        -d '{"username":"admin","password":"TestAdminPassword1234567"}'
      - >-
        TF_ACC=1
        REMNAWAVE_ENDPOINT=http://localhost:3000
        REMNAWAVE_USERNAME=admin
        REMNAWAVE_PASSWORD=TestAdminPassword1234567
        REMNAWAVE_PROXY_HEADERS=true
        go test ./provider -run TestAcc -count=1 -timeout 600s -v

  pre-commit:
    desc: Run all pre-commit checks
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test:unit
      - task: test:vuln
      - task: docs:check
      - task: build
