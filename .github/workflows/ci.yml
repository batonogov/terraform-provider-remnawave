name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -v ./...

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: go test ./provider -skip '^TestAcc' -count=1 -v

  test-acc:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REMNAWAVE_ADMIN_USERNAME: admin
      REMNAWAVE_ADMIN_PASSWORD: TestAdminPassword123456
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Start Remnawave panel
        run: docker compose up --detach --wait --quiet-pull
      - name: Register admin account
        run: |
          echo "Checking panel status..."
          curl -s http://localhost:3000/api/auth/status | jq .
          echo "Registering admin..."
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$REMNAWAVE_ADMIN_USERNAME\",\"password\":\"$REMNAWAVE_ADMIN_PASSWORD\"}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code: $body"
          if [ "$http_code" != "200" ]; then
            echo "Registration failed with HTTP $http_code"
            exit 1
          fi
          echo "$body" | jq -e '.response.accessToken' > /dev/null
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          REMNAWAVE_ENDPOINT: "http://localhost:3000"
          REMNAWAVE_USERNAME: ${{ env.REMNAWAVE_ADMIN_USERNAME }}
          REMNAWAVE_PASSWORD: ${{ env.REMNAWAVE_ADMIN_PASSWORD }}
        run: go test ./provider -run TestAcc -count=1 -timeout 600s -v
      - name: Tear down
        if: always()
        run: docker compose down -v
