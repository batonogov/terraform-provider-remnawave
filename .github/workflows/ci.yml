name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -v ./...

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: go test ./provider -skip '^TestAcc' -count=1 -v

  test-acc:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Start Remnawave panel
        run: |
          docker compose up --detach --wait --quiet-pull
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          REMNAWAVE_ENDPOINT: "http://localhost:3000"
          REMNAWAVE_USERNAME: "admin"
          REMNAWAVE_PASSWORD: "admin"
        run: go test ./provider -run TestAcc -count=1 -timeout 600s -v
      - name: Tear down
        if: always()
        run: docker compose down -v
