name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -v ./...

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run unit tests with race detection and coverage
        run: go test ./provider -skip '^TestAcc' -count=1 -race -covermode=atomic -coverprofile=coverage.out
      - name: Enforce unit coverage floor
        run: |
          go tool cover -func=coverage.out
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          awk -v total="$total" 'BEGIN {
            if (total + 0 < 30.0) {
              printf "Unit coverage %.1f%% is below the 30.0%% floor\n", total
              exit 1
            }
          }'

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.5
          terraform_wrapper: false
      - name: Check example formatting
        run: terraform fmt -check -recursive examples
      - name: Regenerate and validate provider documentation
        run: |
          go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0 generate --provider-dir .
          go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0 validate --provider-dir .
      - name: Ensure generated documentation is current
        run: git diff --exit-code -- docs

  test-acc:
    name: Acceptance Tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "2.8.0"
            version: "2.8.0"
            digest: "sha256:cbc6d2ea0a84d8414dec565bb9ce299a3318b9e5297496baf8efcff2a1e66c65"
            token_payload: '{"name":"acceptance-tests","expiresInDays":1,"scopes":["*"]}'
          - label: "2.7.4"
            version: "2.7.4"
            digest: "sha256:a0e9a3d52e898b894965baed38ee45245b2cdb59ba19e198ab6371319e2968fc"
            token_payload: '{"tokenName":"acceptance-tests"}'
    env:
      REMNAWAVE_ADMIN_USERNAME: admin
      REMNAWAVE_ADMIN_PASSWORD: TestAdminPassword1234567
      REMNAWAVE_VERSION: ${{ matrix.version }}
      REMNAWAVE_DIGEST: ${{ matrix.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Start Remnawave panel
        run: docker compose up --detach --wait --quiet-pull
      - name: Wait for panel API readiness
        run: |
          echo "Waiting for panel API on port 3000..."
          for i in $(seq 1 60); do
            response=$(curl -s -w "\n%{http_code}" \
              -H "X-Forwarded-For: 127.0.0.1" \
              -H "X-Forwarded-Proto: https" \
              http://localhost:3000/api/auth/status 2>/dev/null) || true
            http_code=$(echo "$response" | tail -1)
            if [ "$http_code" = "200" ]; then
              echo "Panel API ready after ${i}s"
              echo "$response" | sed '$d' | jq .
              break
            fi
            echo "  attempt $i: HTTP $http_code"
            sleep 2
          done
          if [ "$http_code" != "200" ]; then
            echo "Panel API did not become ready"
            docker logs remnawave-test 2>&1 | tail -30
            exit 1
          fi
      - name: Register admin account
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-For: 127.0.0.1" \
            -H "X-Forwarded-Proto: https" \
            -X POST http://localhost:3000/api/auth/register \
            -d "{\"username\":\"$REMNAWAVE_ADMIN_USERNAME\",\"password\":\"$REMNAWAVE_ADMIN_PASSWORD\"}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code: $body"
          if [ "$http_code" != "200" ] && [ "$http_code" != "201" ]; then
            echo "Registration failed with HTTP $http_code"
            exit 1
          fi
          ADMIN_JWT=$(echo "$body" | jq -r '.response.accessToken')
          echo "Admin JWT obtained"

          # Create API token for acceptance tests (payload format varies by version)
          token_response=$(curl -s -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-For: 127.0.0.1" \
            -H "X-Forwarded-Proto: https" \
            -H "X-Remnawave-Client-Type: browser" \
            -H "Authorization: Bearer $ADMIN_JWT" \
            -X POST http://localhost:3000/api/tokens \
            -d '${{ matrix.token_payload }}')
          token_http_code=$(echo "$token_response" | tail -1)
          token_body=$(echo "$token_response" | sed '$d')
          echo "Token creation: HTTP $token_http_code"
          API_TOKEN=$(echo "$token_body" | jq -r '.response.token')
          if [ "$API_TOKEN" = "null" ] || [ -z "$API_TOKEN" ]; then
            echo "Failed to create API token: $token_body"
            exit 1
          fi
          echo "API token created"
          echo "REMNAWAVE_API_TOKEN=$API_TOKEN" >> $GITHUB_ENV
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          REMNAWAVE_ENDPOINT: "http://localhost:3000"
          REMNAWAVE_PROXY_HEADERS: "true"
        run: go test ./provider -run TestAcc -count=1 -timeout 600s -v
      - name: Test admin JWT-only resources
        env:
          TF_ACC: "1"
          REMNAWAVE_ENDPOINT: "http://localhost:3000"
          REMNAWAVE_API_TOKEN: ""
          REMNAWAVE_USERNAME: ${{ env.REMNAWAVE_ADMIN_USERNAME }}
          REMNAWAVE_PASSWORD: ${{ env.REMNAWAVE_ADMIN_PASSWORD }}
          REMNAWAVE_PROXY_HEADERS: "true"
        run: go test ./provider -run '^TestAcc(PanelSettings|ApiToken)Resource$|^TestAccPasskeysDataSource$' -count=1 -timeout 600s -v
      - name: Tear down
        if: always()
        run: docker compose down -v
